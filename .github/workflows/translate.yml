name: Auto Translate

on:
  push:
    branches:
      - main  # 如果您的默认分支是 master，请改为 master
    paths:
      - 'docs/**/*.md'  # 只有当 docs 文件夹下的 md 文件发生变化时才触发

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run translation script
        env:
          LLM_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}  # 在 GitHub 仓库的 Settings -> Secrets 中配置您的 Key
        run: |
          python translate.py

      - name: Commit and push translated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if ! git diff --cached --quiet; then
            git commit -m "docs: auto translate markdown files via DeepSeek [skip ci]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit"
          fi